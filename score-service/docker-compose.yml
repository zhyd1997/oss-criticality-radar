services:
  score-service:
    build: .
    ports:
      - "8080:8080"
    # Inject secrets/config into the container from optional files.
    # Do NOT re-list GITHUB_AUTH_TOKEN / SCORE_SERVICE_TOKEN under `environment`
    # with ${VAR:-}: empty host interpolation overrides env_file with blanks.
    env_file:
      - path: ../.env.local
        required: false
      - path: .env
        required: false
    environment:
      PORT: "8080"
      # Only set non-secret defaults here. Tokens come from env_file (or a real
      # host export). Optional override when you intentionally export them:
      SCORE_MAX_CONCURRENCY: ${SCORE_MAX_CONCURRENCY:-2}
